name: Deploy plugin to WordPress.org

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: Plugin to deploy
        required: true
        type: choice
        options:
          - add-ids-to-header-tags
          - automatic-internal-links
          - big-emoji-comments
          - category-posts-widget
          - custom-content-width
          - footer-on-homepage
          - go-dark
          - google-tag-manager
          - hugh
          - legacy-jetpack-custom-css-editor
          - ndizi-project-management
          - omnisearch
          - press-this-v2
          - random-blocks
          - restrict-block-content
          - reusable-block-count
          - simple-404-keyword-insertion
          - tarot
          - the
          - theme-downloader
          - tuft-feedback
          - update-control
      version:
        description: Version number to release (e.g. 1.2.3)
        required: true
        type: string
      dry_run:
        description: Dry run — skip the SVN commit
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize submodule if needed
        run: |
          SLUG="${{ inputs.plugin }}"
          if git config -f .gitmodules --get "submodule.$SLUG.url" > /dev/null 2>&1; then
            echo "$SLUG is a submodule — initializing only this one"
            git submodule update --init "$SLUG"
          else
            echo "$SLUG is a direct-directory plugin — no submodule init needed"
          fi

      - name: Bump version in plugin files
        run: |
          SLUG="${{ inputs.plugin }}"
          VERSION="${{ inputs.version }}"

          # PHP plugin header — find the file that contains "Plugin Name:"
          PHP_FILE=$(grep -rl "Plugin Name:" "./$SLUG" --include="*.php" | head -1)
          if [ -n "$PHP_FILE" ]; then
            sed -i "s/Version: .*/Version: $VERSION/" "$PHP_FILE"
            echo "Bumped version in $PHP_FILE"
          fi

          # Stable tag in readme.txt or README.md
          for readme in "./$SLUG/readme.txt" "./$SLUG/README.md"; do
            if [ -f "$readme" ]; then
              sed -i "s/Stable tag: .*/Stable tag: $VERSION/" "$readme"
              echo "Bumped Stable tag in $readme"
            fi
          done

      - name: Build assets (if package.json present)
        run: |
          SLUG="${{ inputs.plugin }}"
          if [ -f "./$SLUG/package.json" ]; then
            echo "Building $SLUG..."
            cd "./$SLUG"
            npm ci
            npm run build --if-present
          else
            echo "No package.json found — skipping build."
          fi

      - name: Install SVN
        run: sudo apt-get install -y subversion

      - name: Deploy to WordPress.org SVN
        env:
          SVN_USERNAME: ${{ vars.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        run: |
          SLUG="${{ inputs.plugin }}"
          VERSION="${{ inputs.version }}"
          SRC="./$SLUG"
          SVN_URL="https://plugins.svn.wordpress.org/$SLUG"
          SVN_DIR="/tmp/svn-$SLUG"

          # Fail early if this SVN tag already exists
          if svn ls "$SVN_URL/tags/$VERSION" > /dev/null 2>&1; then
            echo "ERROR: SVN tag $VERSION already exists for $SLUG. Aborting to avoid overwrite."
            exit 1
          fi

          # Shallow checkout — trunk and assets
          svn checkout --depth immediates "$SVN_URL" "$SVN_DIR"
          svn update --set-depth infinity "$SVN_DIR/trunk"
          svn update --set-depth infinity "$SVN_DIR/assets"

          # Build rsync exclusions from .distignore (preferred) or .gitattributes
          EXCLUDES="--exclude=.git/ --exclude=.github/ --exclude=node_modules/ --exclude=.distignore"
          if [ -f "$SRC/.distignore" ]; then
            echo "Using .distignore for exclusions:"
            while IFS= read -r line; do
              [[ -z "$line" || "$line" == \#* ]] && continue
              echo "  excluding: $line"
              EXCLUDES="$EXCLUDES --exclude=$line"
            done < "$SRC/.distignore"
          elif [ -f "$SRC/.gitattributes" ]; then
            echo "Using .gitattributes export-ignore for exclusions:"
            while IFS= read -r line; do
              [[ "$line" == *"export-ignore"* ]] || continue
              path=$(echo "$line" | awk '{print $1}')
              echo "  excluding: $path"
              EXCLUDES="$EXCLUDES --exclude=$path"
            done < "$SRC/.gitattributes"
          fi

          # Sync plugin files into SVN trunk
          rsync -rc --delete $EXCLUDES "$SRC/" "$SVN_DIR/trunk/"

          # Stage new and removed files
          svn status "$SVN_DIR/trunk" | grep '^?' | awk '{print $2}' | xargs -r svn add --force
          svn status "$SVN_DIR/trunk" | grep '^!' | awk '{print $2}' | xargs -r svn delete

          # Sync .wordpress-org/ into SVN assets/ (banners, icons, screenshots)
          if [ -d "$SRC/.wordpress-org" ]; then
            rsync -rc "$SRC/.wordpress-org/" "$SVN_DIR/assets/"
            svn status "$SVN_DIR/assets" | grep '^?' | awk '{print $2}' | xargs -r svn add --force
            svn status "$SVN_DIR/assets" | grep '^!' | awk '{print $2}' | xargs -r svn delete
          else
            echo "No .wordpress-org directory found — skipping asset sync."
          fi

          # Show what would be committed
          echo "--- SVN diff summary ---"
          svn status "$SVN_DIR/trunk"
          svn status "$SVN_DIR/assets"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run — skipping SVN commit and tag."
            exit 0
          fi

          # Commit trunk and assets
          svn commit "$SVN_DIR" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --no-auth-cache \
            -m "Deploying $SLUG v$VERSION"

          # Tag the release
          svn copy \
            "$SVN_URL/trunk" \
            "$SVN_URL/tags/$VERSION" \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --no-auth-cache \
            -m "Tagging $SLUG v$VERSION"

          echo "Deployed $SLUG v$VERSION to WordPress.org"

      - name: Update versions.json
        if: ${{ !inputs.dry_run }}
        run: |
          python3 -c "
          import json
          with open('versions.json') as f:
              data = json.load(f)
          data['${{ inputs.plugin }}'] = '${{ inputs.version }}'
          with open('versions.json', 'w') as f:
              json.dump(data, f, indent=2, sort_keys=True)
              f.write('\n')
          "

      - name: Refresh README deploy status
        if: ${{ !inputs.dry_run }}
        run: python3 scripts/update-readme-status.py

      - name: Commit version bump back to Git
        # Direct-directory plugins: commits the bump to the monorepo.
        # Submodule plugins: pushes a branch to the upstream repo and opens a PR.
        # Requires GH_PAT secret (repo scope) for cross-repo push/PR access.
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          SLUG="${{ inputs.plugin }}"
          VERSION="${{ inputs.version }}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Override the GITHUB_TOKEN credential injected by actions/checkout so that
          # pushes back to this monorepo use GH_PAT instead (which has write access).
          git config --local --unset-all "http.https://github.com/.extraheader" 2>/dev/null || true
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          if git config -f .gitmodules --get "submodule.$SLUG.url" > /dev/null 2>&1; then
            # Submodule plugin — push a branch and open a PR upstream
            REMOTE_URL=$(git config -f .gitmodules --get "submodule.$SLUG.url")
            REPO=$(echo "$REMOTE_URL" | sed 's|https://github.com/||;s|\.git$||')
            BRANCH="bump-v$VERSION"
            DEFAULT_BRANCH=$(gh repo view "$REPO" --json defaultBranchRef --jq '.defaultBranchRef.name')

            cd "./$SLUG"
            # actions/checkout injects GITHUB_TOKEN into http.extraheader for every submodule,
            # which overrides inline credentials in the remote URL. Unset it so GH_PAT is used.
            git config --local --unset-all "http.https://github.com/.extraheader" 2>/dev/null || true
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
            git fetch origin "$DEFAULT_BRANCH"
            git checkout "$DEFAULT_BRANCH"
            git checkout -b "$BRANCH"
            git add -A
            if git diff --cached --quiet; then
              echo "Version already at $VERSION in $REPO — no bump needed, skipping PR."
            else
              git commit -m "Bump version to $VERSION"
              git push origin "$BRANCH"

              gh pr create \
                --repo "$REPO" \
                --title "Bump $SLUG to v$VERSION" \
                --body "Version bump to \`$VERSION\` for WordPress.org release, deployed via the [plugins monorepo](https://github.com/${{ github.repository }})." \
                --base "$DEFAULT_BRANCH" \
                --head "$BRANCH"

              echo "PR opened in $REPO"
            fi

            # Back to monorepo root — commit versions.json + README.md
            cd "$GITHUB_WORKSPACE"
            if ! git diff --quiet versions.json README.md; then
              git add versions.json README.md
              git commit -m "Update deploy status for $SLUG v$VERSION"
              git push
            fi
          else
            # Direct-directory plugin — commit bump to the monorepo
            if git diff --quiet "./$SLUG" versions.json README.md; then
              echo "No changes to commit in ./$SLUG"
            else
              git add "./$SLUG" versions.json README.md
              git commit -m "Bump $SLUG to v$VERSION"
              git push
            fi
          fi
