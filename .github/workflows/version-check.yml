name: Refresh deploy status in README

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run — show pending deploys without committing
        required: false
        type: boolean
        default: false

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Run version check
        run: python3 scripts/update-readme-status.py

      - name: Commit README update
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md; then
            echo "README.md is already up to date."
          else
            git add README.md
            git commit -m "Refresh deploy status in README"
            git push
          fi
