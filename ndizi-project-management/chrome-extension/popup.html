<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ndizi Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #818cf8;
      --primary-hover: #6366f1;
      --success: #34d399;
      --danger: #f87171;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      width: 320px;
      box-sizing: border-box;
      overflow-x: hidden;
    }
    h2, h3 {
      margin-top: 0;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    h2 {
      font-size: 20px;
      margin-bottom: 5px;
      background: linear-gradient(135deg, #ffffff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-glow {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), #c084fc);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(129, 140, 248, 0.5);
    }
    .logo-title {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    .form-group {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, select {
      width: 100%;
      padding: 8px 12px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
      transition: all 0.2s ease;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(129, 140, 248, 0.3);
    }
    button {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
    }
    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-main);
      box-shadow: none;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .alert {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .alert-error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: #fca5a5;
    }
    .alert-success {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
      color: #a7f3d0;
    }
    .screen {
      display: none;
    }
    .screen.active {
      display: block;
    }
    /* Timer Ticking Display */
    .timer-display {
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      margin: 15px 0;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(to right, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .timer-active .timer-display {
      background: linear-gradient(to right, var(--success), #a7f3d0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .loader {
      display: none;
      text-align: center;
      padding: 20px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
    .loader-spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .meta-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .meta-footer a {
      color: var(--primary);
      text-decoration: none;
    }
    .meta-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <div class="logo-glow"></div>
    <span class="logo-title">Ndizi Time Tracker</span>
  </div>

  <!-- Loading Screen -->
  <div id="loader" class="loader">
    <div class="loader-spinner"></div>
    <div id="loader-text">Loading...</div>
  </div>

  <!-- Setup Screen -->
  <div id="setup-screen" class="screen card">
    <h2>Connect Ndizi</h2>
    <div id="setup-error" class="alert alert-error" style="display: none;"></div>
    
    <div class="form-group">
      <label for="wp-url">WordPress URL</label>
      <input type="url" id="wp-url" placeholder="https://example.com" required>
    </div>
    
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="admin" required>
    </div>
    
    <div class="form-group">
      <label for="app-password">Application Password</label>
      <input type="password" id="app-password" placeholder="xxxx xxxx xxxx xxxx" required>
    </div>
    
    <button id="connect-btn">Authenticate & Connect</button>
    <button id="cancel-setup-btn" class="btn-secondary" style="display: none; margin-top: 8px;">Back to Tracker</button>
  </div>

  <!-- Tracker Screen -->
  <div id="tracker-screen" class="screen card">
    <div id="tracker-error" class="alert alert-error" style="display: none;"></div>
    
    <div class="form-group" id="site-switcher-container" style="margin-bottom: 15px;">
      <label for="site-select">Current Site</label>
      <div style="display: flex; gap: 8px; align-items: center;">
        <select id="site-select" style="flex: 1;">
          <!-- Options populated dynamically -->
        </select>
        <button id="add-site-btn" style="width: auto; padding: 8px 12px; font-size: 11px; white-space: nowrap; margin: 0; box-shadow: none;">+ Add</button>
      </div>
    </div>

    <div class="timer-container" id="timer-container">
      <div class="timer-display" id="timer-display">00:00:00</div>
    </div>

    <div class="form-group">
      <label for="project-select">Project</label>
      <select id="project-select">
        <option value="">-- Select Project --</option>
      </select>
    </div>

    <div class="form-group">
      <label for="task-select">Task</label>
      <select id="task-select">
        <option value="">-- Select Task --</option>
      </select>
    </div>

    <div class="form-group">
      <label for="desc-input">What are you working on?</label>
      <input type="text" id="desc-input" placeholder="Task description..." maxlength="255">
    </div>

    <button id="toggle-timer-btn">Start Timer</button>
    <button id="disconnect-btn" class="btn-secondary">Disconnect Site</button>

    <div class="meta-footer">
      <span id="user-display">Connected</span>
      <a href="#" id="view-dashboard-link" target="_blank">Portal</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
